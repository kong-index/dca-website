<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title description">
  <title id="title">DCA D Favicon Final</title>
  <desc id="description">Final DCA D favicon with optical-centering guides.</desc>

  <g inkscape:groupmode="layer" inkscape:label="01 Background" id="background">
    <rect width="1024" height="1024" fill="#FAF9F7"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="02 Centering Guides" id="centering-guides">
    <line x1="96" y1="512" x2="928" y2="512" stroke="#496D86" stroke-width="2" stroke-dasharray="12 12"/>
    <line x1="512" y1="96" x2="512" y2="928" stroke="#496D86" stroke-width="2" stroke-dasharray="12 12"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="03 Final D Mark" id="final-d-mark" transform="translate(512 512) scale(1.5) translate(-256 -256)">
    <circle cx="256" cy="256" r="184" fill="none" stroke="#111111" stroke-width="31"/>
    <text x="262" y="250" fill="#111111" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="280" font-weight="700" text-anchor="middle" dominant-baseline="central">D</text>
  </g>
</svg>
